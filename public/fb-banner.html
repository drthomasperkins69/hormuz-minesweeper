<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Facebook Banners - Hormuz Strait Sweeper</title>
<style>
body { background: #111; display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 40px; font-family: sans-serif; color: #aaa; }
h2 { color: #fff; margin-bottom: 0; }
p { margin-top: 5px; color: #888; font-size: 14px; }
canvas { border: 2px solid #333; cursor: pointer; }
canvas:hover { border-color: #666; }
</style>
</head>
<body>
<h1 style="color:#e0d5b0; font-family: Georgia, serif;">Facebook Ad Banners</h1>
<p>Right-click any banner and "Save Image As" to download</p>

<!-- Banner 1: 1200x628 Facebook Feed -->
<h2>Facebook Feed Ad (1200x628)</h2>
<p>Optimal for Facebook feed posts and ads</p>
<canvas id="fb1" width="1200" height="628"></canvas>

<!-- Banner 2: 1080x1080 Facebook Square -->
<h2>Facebook Square Post (1080x1080)</h2>
<p>Perfect for Facebook & Instagram feed</p>
<canvas id="fb2" width="1080" height="1080"></canvas>

<!-- Banner 3: 1200x444 Facebook Cover -->
<h2>Facebook Cover/Event Banner (1200x444)</h2>
<canvas id="fb3" width="1200" height="444"></canvas>

<script>
function drawBanner1(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Dark navy background
  const bg = ctx.createLinearGradient(0, 0, w, h);
  bg.addColorStop(0, '#0a1628');
  bg.addColorStop(0.5, '#132744');
  bg.addColorStop(1, '#0a1628');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Ocean waves
  for (let i = 0; i < 8; i++) {
    ctx.strokeStyle = `rgba(60,140,200,${0.08 + i * 0.02})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x < w; x += 5) {
      const y = h * 0.4 + i * 25 + Math.sin(x * 0.008 + i) * 15;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Land masses (simplified)
  ctx.fillStyle = '#8a7a50';
  // Iran top
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(w, 0); ctx.lineTo(w, h*0.2);
  ctx.quadraticCurveTo(w*0.7, h*0.35, w*0.4, h*0.3);
  ctx.quadraticCurveTo(w*0.2, h*0.25, 0, h*0.28);
  ctx.closePath(); ctx.fill();

  // Arabia bottom
  ctx.beginPath();
  ctx.moveTo(0, h); ctx.lineTo(w, h); ctx.lineTo(w, h*0.7);
  ctx.quadraticCurveTo(w*0.7, h*0.6, w*0.5, h*0.65);
  ctx.quadraticCurveTo(w*0.3, h*0.72, 0, h*0.75);
  ctx.closePath(); ctx.fill();

  // Mines scattered
  ctx.font = '28px sans-serif';
  const minePositions = [[200,300],[400,350],[600,320],[800,380],[1000,340],[300,400],[700,420],[500,280],[900,300],[150,370]];
  minePositions.forEach(([x,y]) => ctx.fillText('💣', x, y));

  // Missiles
  for (let i = 0; i < 3; i++) {
    const sx = 200 + i * 350;
    ctx.save();
    ctx.translate(sx, h*0.25);
    ctx.rotate(0.5);
    ctx.fillStyle = '#ccc';
    ctx.beginPath();
    ctx.moveTo(20, 0); ctx.lineTo(-10, -5); ctx.lineTo(-10, 5); ctx.closePath();
    ctx.fill();
    // Trail
    const tg = ctx.createLinearGradient(-60, 0, 0, 0);
    tg.addColorStop(0, 'rgba(255,100,0,0)');
    tg.addColorStop(1, 'rgba(255,150,50,0.8)');
    ctx.strokeStyle = tg;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-60, 0); ctx.lineTo(-10, 0); ctx.stroke();
    ctx.restore();
  }

  // Explosion
  const eg = ctx.createRadialGradient(w*0.75, h*0.55, 0, w*0.75, h*0.55, 50);
  eg.addColorStop(0, 'rgba(255,255,200,0.8)');
  eg.addColorStop(0.4, 'rgba(255,120,0,0.6)');
  eg.addColorStop(1, 'rgba(255,50,0,0)');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.arc(w*0.75, h*0.55, 50, 0, Math.PI*2); ctx.fill();

  // Title
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#e0d5b0';
  ctx.font = 'bold 52px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('HORMUZ STRAIT SWEEPER', w/2, h*0.45);

  // Subtitle
  ctx.fillStyle = '#ff6644';
  ctx.font = 'bold 28px "Courier New", monospace';
  ctx.fillText('CLEAR THE STRAIT BEFORE THE WORLD ECONOMY COLLAPSES!', w/2, h*0.53);

  // Oil price
  ctx.fillStyle = '#44cc44';
  ctx.font = 'bold 22px "Courier New", monospace';
  ctx.fillText('Oil: $50/bbl', w*0.15, h*0.92);
  ctx.fillStyle = '#ff4444';
  ctx.fillText('Oil: $199/bbl', w*0.85, h*0.92);
  // Arrow
  ctx.strokeStyle = '#ffaa44';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(w*0.25, h*0.9); ctx.lineTo(w*0.75, h*0.9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w*0.73, h*0.885); ctx.lineTo(w*0.75, h*0.9); ctx.lineTo(w*0.73, h*0.915); ctx.stroke();

  // URL
  ctx.fillStyle = '#8fd4ff';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText('hormuzstraitsweeper.com', w/2, h*0.92);

  // Play now badge
  ctx.fillStyle = '#ff4444';
  roundRect(ctx, w*0.38, h*0.58, w*0.24, 50, 25);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText('PLAY FREE NOW', w/2, h*0.63 + 17);

  ctx.shadowBlur = 0;
}

function drawBanner2(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Background
  const bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w*0.7);
  bg.addColorStop(0, '#1a3050');
  bg.addColorStop(1, '#0a1020');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Water texture
  for (let y = h*0.25; y < h*0.75; y += 6) {
    ctx.strokeStyle = `rgba(50,120,180,${0.1 + Math.random()*0.05})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x < w; x += 5) {
      const yy = y + Math.sin(x*0.01 + y*0.1)*8;
      x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
    }
    ctx.stroke();
  }

  // Big mine in center
  ctx.font = '180px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('💣', w/2, h/2 + 30);

  // Red circle/crosshair around mine
  ctx.strokeStyle = 'rgba(255,50,50,0.6)';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(w/2, h/2 - 30, 120, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w/2, h/2-160); ctx.lineTo(w/2, h/2-130); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w/2, h/2+70); ctx.lineTo(w/2, h/2+100); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w/2-130, h/2-30); ctx.lineTo(w/2-100, h/2-30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w/2+100, h/2-30); ctx.lineTo(w/2+130, h/2-30); ctx.stroke();

  // Title at top
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#e0d5b0';
  ctx.font = 'bold 56px Georgia, serif';
  ctx.fillText('HORMUZ', w/2, 80);
  ctx.fillText('STRAIT SWEEPER', w/2, 140);

  // Warning text
  ctx.fillStyle = '#ff6644';
  ctx.font = 'bold 26px "Courier New", monospace';
  ctx.fillText('CAN YOU CLEAR THE MINES', w/2, h*0.22);
  ctx.fillText('BEFORE OIL HITS $200/BBL?', w/2, h*0.26);

  // Stats bar
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, 60, h*0.78, w-120, 80, 10);
  ctx.fill();

  ctx.fillStyle = '#aabbcc';
  ctx.font = '20px "Courier New", monospace';
  ctx.fillText('99 MINES  |  REAL MAP  |  MISSILES  |  OIL TIMER', w/2, h*0.82 + 20);

  // Play button
  ctx.fillStyle = '#ff4444';
  roundRect(ctx, w*0.25, h*0.88, w*0.5, 60, 30);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillText('PLAY AT HORMUZSTRAITSWEEPER.COM', w/2, h*0.88 + 40);

  ctx.shadowBlur = 0;
}

function drawBanner3(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Background
  const bg = ctx.createLinearGradient(0, 0, w, 0);
  bg.addColorStop(0, '#0a1628');
  bg.addColorStop(0.5, '#162a48');
  bg.addColorStop(1, '#0a1628');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Waves
  for (let i = 0; i < 5; i++) {
    ctx.strokeStyle = `rgba(60,140,200,${0.06})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let x = 0; x < w; x += 4) {
      const y = h*0.5 + i*15 + Math.sin(x*0.006+i*2)*10;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Emojis scattered
  ctx.font = '30px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('💣', 50, 80); ctx.fillText('🚀', 150, 350); ctx.fillText('💥', 300, 120);
  ctx.fillText('🛢️', 1050, 100); ctx.fillText('💣', 1100, 350); ctx.fillText('🚢', 950, 300);

  // Title
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#e0d5b0';
  ctx.font = 'bold 64px Georgia, serif';
  ctx.fillText('HORMUZ STRAIT SWEEPER', w/2, h*0.35);

  ctx.fillStyle = '#ff6644';
  ctx.font = 'bold 28px "Courier New", monospace';
  ctx.fillText('CLEAR THE STRAIT BEFORE THE WORLD ECONOMY COLLAPSES!!!', w/2, h*0.55);

  // Oil meter bar
  ctx.fillStyle = '#111';
  roundRect(ctx, w*0.3, h*0.65, w*0.4, 20, 10);
  ctx.fill();
  const oilGrad = ctx.createLinearGradient(w*0.3, 0, w*0.62, 0);
  oilGrad.addColorStop(0, '#44aa44');
  oilGrad.addColorStop(0.5, '#aaaa00');
  oilGrad.addColorStop(1, '#ff3333');
  ctx.fillStyle = oilGrad;
  roundRect(ctx, w*0.3, h*0.65, w*0.32, 20, 10);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('$50/bbl ────────────────── $200/bbl', w/2, h*0.65+15);

  // URL
  ctx.fillStyle = '#8fd4ff';
  ctx.font = 'bold 26px sans-serif';
  ctx.fillText('hormuzstraitsweeper.com', w/2, h*0.88);

  ctx.shadowBlur = 0;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

drawBanner1(document.getElementById('fb1'));
drawBanner2(document.getElementById('fb2'));
drawBanner3(document.getElementById('fb3'));
</script>
</body>
</html>
